version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: logw_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: logw_db
      MYSQL_USER: logw_user
      MYSQL_PASSWORD: logw_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/database_docs/database.sql:/docker-entrypoint-initdb.d/setup.sql

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: logw_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_USER: logw_user
      DB_PASSWORD: logw_password
      DB_NAME: logw_db
      JWT_SECRET: your_super_secret_key_here
    depends_on:
      - db

volumes:
  db_data:
